{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-8 col-lg-6">
        <div class="glass-card p-5">
            <div class="text-center mb-5">
                <div class="d-inline-flex align-items-center justify-content-center bg-primary bg-opacity-10 text-primary rounded-circle mb-3" style="width: 80px; height: 80px;">
                    <i class="bi bi-person-plus-fill fs-1"></i>
                </div>
                <h3 class="fw-bold">Onboard New Talent</h3>
                <p class="text-muted">Enter the details to add a new employee to the intelligence system.</p>
            </div>

            <form action="{{ url_for('add_employee') }}" method="POST">
                
                <div class="form-floating mb-4">
                    <select class="form-select border-0 bg-secondary bg-opacity-10 shadow-none" id="type" name="type" required onchange="toggleFields()">
                        <option value="" disabled selected>Select an option</option>
                        <option value="fulltime">Full-Time Employee</option>
                        <option value="parttime">Part-Time / Contractor</option>
                        <option value="manager">Department Manager</option>
                    </select>
                    <label for="type"><i class="bi bi-briefcase me-2"></i>Employment Type</label>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="text" class="form-control border-0 bg-secondary bg-opacity-10 shadow-none" id="employee_id" name="employee_id" placeholder="ID" required>
                            <label for="employee_id"><i class="bi bi-hash me-2"></i>Employee ID</label>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="text" class="form-control border-0 bg-secondary bg-opacity-10 shadow-none" id="name" name="name" placeholder="Name" required>
                            <label for="name"><i class="bi bi-person me-2"></i>Full Name</label>
                        </div>
                    </div>
                </div>

                <div class="form-floating mb-4">
                    <input type="text" class="form-control border-0 bg-secondary bg-opacity-10 shadow-none" id="department" name="department" placeholder="Dept" required>
                    <label for="department"><i class="bi bi-building me-2"></i>Department</label>
                </div>

                <!-- Dynamic Fields based on Type -->
                <div id="dynamic-container" class="p-4 rounded-3 bg-primary bg-opacity-10 mb-4" style="display: none; border: 1px dashed rgba(99,102,241,0.3);">
                    
                    <div id="fulltime-fields" style="display: none;">
                        <div class="form-floating">
                            <input type="number" step="0.01" class="form-control border-0 bg-white shadow-none" id="monthly_salary" name="monthly_salary" min="0" placeholder="0.00">
                            <label for="monthly_salary" class="text-primary"><i class="bi bi-currency-dollar me-2"></i>Base Monthly Salary</label>
                        </div>
                    </div>

                    <div id="parttime-fields" style="display: none;">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="number" step="0.01" class="form-control border-0 bg-white shadow-none" id="hourly_rate" name="hourly_rate" min="0" placeholder="0.00">
                                    <label for="hourly_rate" class="text-primary"><i class="bi bi-cash me-2"></i>Hourly Rate</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="number" step="0.01" class="form-control border-0 bg-white shadow-none" id="hours_worked" name="hours_worked" min="0" placeholder="0">
                                    <label for="hours_worked" class="text-primary"><i class="bi bi-clock-history me-2"></i>Hours/Month</label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div id="manager-fields" class="mt-3" style="display: none;">
                        <div class="form-floating">
                            <input type="number" step="0.01" class="form-control border-0 bg-white shadow-none" id="bonus" name="bonus" min="0" placeholder="0.00">
                            <label for="bonus" class="text-primary"><i class="bi bi-award me-2"></i>Manager Bonus</label>
                        </div>
                    </div>

                </div>

                <div class="d-grid mt-5">
                    <button type="submit" class="btn-gradient btn-lg shadow-sm py-3"><i class="bi bi-plus-circle me-2"></i>Register Talent</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function toggleFields() {
        const type = document.getElementById("type").value;
        const container = document.getElementById("dynamic-container");
        const ftFields = document.getElementById("fulltime-fields");
        const ptFields = document.getElementById("parttime-fields");
        const mgrFields = document.getElementById("manager-fields");

        container.style.display = "block";
        
        // Reset
        ftFields.style.display = "none";
        ptFields.style.display = "none";
        mgrFields.style.display = "none";

        if (type === "fulltime") {
            ftFields.style.display = "block";
            document.getElementById("monthly_salary").required = true;
            document.getElementById("hourly_rate").required = false;
            document.getElementById("hours_worked").required = false;
            document.getElementById("bonus").required = false;
        } else if (type === "parttime") {
            ptFields.style.display = "block";
            document.getElementById("hourly_rate").required = true;
            document.getElementById("hours_worked").required = true;
            document.getElementById("monthly_salary").required = false;
            document.getElementById("bonus").required = false;
        } else if (type === "manager") {
            ftFields.style.display = "block";
            mgrFields.style.display = "block";
            document.getElementById("monthly_salary").required = true;
            document.getElementById("bonus").required = true;
            document.getElementById("hourly_rate").required = false;
            document.getElementById("hours_worked").required = false;
        }
    }
</script>
{% endblock %}
